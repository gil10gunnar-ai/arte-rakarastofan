<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Time Zone Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .clock-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-10px);
        }

        .city-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .timezone-label {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 20px;
        }

        .digital-time {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }

        .am-pm {
            font-size: 1.2em;
            color: #764ba2;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .date {
            font-size: 0.9em;
            color: #555;
            margin-bottom: 20px;
        }

        .day-night-indicator {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            color: white;
        }

        .day-indicator {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
        }

        .night-indicator {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }

        /* Analog Clock */
        .analog-clock {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #f0f0f0;
            margin: 20px auto;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .clock-center {
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
        }

        .hour-hand {
            width: 6px;
            height: 40px;
            background: #333;
            margin-left: -3px;
        }

        .minute-hand {
            width: 4px;
            height: 50px;
            background: #667eea;
            margin-left: -2px;
        }

        .second-hand {
            width: 2px;
            height: 55px;
            background: #e74c3c;
            margin-left: -1px;
        }

        .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 0.8em;
            font-weight: bold;
            color: #333;
        }

        .clock-number span {
            position: absolute;
            width: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Settings Section */
        .settings {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .settings h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .timezone-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .timezone-input input,
        .timezone-input select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .timezone-input input:focus,
        .timezone-input select:focus {
            outline: none;
            border-color: #667eea;
        }

        .timezone-input button {
            padding: 10px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .timezone-input button:hover {
            transform: scale(1.05);
        }

        .added-timezones {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .timezone-badge {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 0.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .remove-btn:hover {
            background: #c0392b;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .digital-time {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 World Time Zone Clock</h1>

        <div class="clocks-grid" id="clocksContainer">
            <!-- Clocks will be generated here -->
        </div>

        <div class="settings">
            <h2>Add Custom Time Zone</h2>
            <div class="timezone-input">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name (e.g., Tokyo, New York)"
                >
                <select id="timezoneSelect">
                    <option value="">Select Time Zone</option>
                    <option value="UTC-12">UTC-12 (Baker Island)</option>
                    <option value="UTC-11">UTC-11 (American Samoa)</option>
                    <option value="UTC-10">UTC-10 (Hawaii)</option>
                    <option value="UTC-9">UTC-9 (Alaska)</option>
                    <option value="UTC-8">UTC-8 (Los Angeles, PST)</option>
                    <option value="UTC-7">UTC-7 (Denver, MST)</option>
                    <option value="UTC-6">UTC-6 (Chicago, CST)</option>
                    <option value="UTC-5">UTC-5 (New York, EST)</option>
                    <option value="UTC-4">UTC-4 (Atlantic, EDT)</option>
                    <option value="UTC-3.5">UTC-3.5 (Newfoundland)</option>
                    <option value="UTC-3">UTC-3 (Brazil, Buenos Aires)</option>
                    <option value="UTC-2">UTC-2 (Mid-Atlantic)</option>
                    <option value="UTC-1">UTC-1 (Azores)</option>
                    <option value="UTC+0">UTC+0 (London, GMT)</option>
                    <option value="UTC+1">UTC+1 (Paris, CET)</option>
                    <option value="UTC+2">UTC+2 (Cairo, EET)</option>
                    <option value="UTC+3">UTC+3 (Moscow, Istanbul)</option>
                    <option value="UTC+3.5">UTC+3.5 (Tehran)</option>
                    <option value="UTC+4">UTC+4 (Dubai, Baku)</option>
                    <option value="UTC+4.5">UTC+4.5 (Kabul)</option>
                    <option value="UTC+5">UTC+5 (Pakistan, Tajikistan)</option>
                    <option value="UTC+5.5">UTC+5.5 (India, Sri Lanka)</option>
                    <option value="UTC+5.75">UTC+5.75 (Nepal)</option>
                    <option value="UTC+6">UTC+6 (Bangladesh, Kazakhstan)</option>
                    <option value="UTC+6.5">UTC+6.5 (Myanmar)</option>
                    <option value="UTC+7">UTC+7 (Bangkok, Jakarta)</option>
                    <option value="UTC+8">UTC+8 (Beijing, Singapore, Hong Kong)</option>
                    <option value="UTC+9">UTC+9 (Tokyo, Seoul)</option>
                    <option value="UTC+9.5">UTC+9.5 (Adelaide)</option>
                    <option value="UTC+10">UTC+10 (Sydney, Melbourne)</option>
                    <option value="UTC+10.5">UTC+10.5 (Lord Howe Island)</option>
                    <option value="UTC+11">UTC+11 (Solomon Islands)</option>
                    <option value="UTC+12">UTC+12 (Fiji, New Zealand)</option>
                    <option value="UTC+13">UTC+13 (Tonga, Samoa)</option>
                    <option value="UTC+14">UTC+14 (Line Islands)</option>
                </select>
                <button onclick="addTimezone()">Add Clock</button>
            </div>
            <div class="added-timezones" id="addedTimezones"></div>
        </div>
    </div>

    <script>
        // Default time zones
        const defaultTimezones = [
            { city: 'Reykjavik', timezone: 'UTC+0' },
            { city: 'London', timezone: 'UTC+0' },
            { city: 'Paris', timezone: 'UTC+1' },
            { city: 'Tokyo', timezone: 'UTC+9' },
            { city: 'New York', timezone: 'UTC-5' },
            { city: 'Sydney', timezone: 'UTC+10' }
        ];

        let customTimezones = JSON.parse(localStorage.getItem('customTimezones')) || [];
        let allTimezones = [...defaultTimezones, ...customTimezones];

        function parseTimezone(tzString) {
            const match = tzString.match(/UTC([+-]?\d+\.?\d*)/);
            if (match) {
                return parseFloat(match[1]);
            }
            return 0;
        }

        function updateClocks() {
            const container = document.getElementById('clocksContainer');
            container.innerHTML = '';

            allTimezones.forEach((tz, index) => {
                const offsetHours = parseTimezone(tz.timezone);
                const now = new Date();
                const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                const localTime = new Date(utc + (3600000 * offsetHours));

                const hours = String(localTime.getHours()).padStart(2, '0');
                const minutes = String(localTime.getMinutes()).padStart(2, '0');
                const seconds = String(localTime.getSeconds()).padStart(2, '0');
                const ampm = localTime.getHours() >= 12 ? 'PM' : 'AM';
                const isDaytime = localTime.getHours() >= 6 && localTime.getHours() < 18;

                const dateStr = localTime.toLocaleDateString('en-US', {
                    weekday: 'short',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                const hourAngle = (localTime.getHours() % 12) * 30 + localTime.getMinutes() * 0.5;
                const minuteAngle = localTime.getMinutes() * 6 + localTime.getSeconds() * 0.1;
                const secondAngle = localTime.getSeconds() * 6;

                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="city-name">${tz.city}</div>
                    <div class="timezone-label">${tz.timezone}</div>
                    
                    <div class="analog-clock">
                        <div class="clock-center"></div>
                        <div class="hand hour-hand" style="transform: rotate(${hourAngle}deg)"></div>
                        <div class="hand minute-hand" style="transform: rotate(${minuteAngle}deg)"></div>
                        <div class="hand second-hand" style="transform: rotate(${secondAngle}deg)"></div>
                    </div>
                    
                    <div class="digital-time">${hours}:${minutes}:${seconds}</div>
                    <div class="am-pm">${ampm}</div>
                    <div class="date">${dateStr}</div>
                    <div class="day-night-indicator ${isDaytime ? 'day-indicator' : 'night-indicator'}">
                        ${isDaytime ? '☀️ Day' : '🌙 Night'}
                    </div>
                `;
                container.appendChild(card);
            });

            updateAddedTimezonesDisplay();
        }

        function addTimezone() {
            const cityInput = document.getElementById('cityInput');
            const timezoneSelect = document.getElementById('timezoneSelect');

            const city = cityInput.value.trim();
            const timezone = timezoneSelect.value;

            if (!city || !timezone) {
                alert('Please enter a city name and select a timezone');
                return;
            }

            const newTimezone = { city, timezone };
            customTimezones.push(newTimezone);
            allTimezones = [...defaultTimezones, ...customTimezones];

            localStorage.setItem('customTimezones', JSON.stringify(customTimezones));

            cityInput.value = '';
            timezoneSelect.value = '';

            updateClocks();
        }

        function removeTimezone(index) {
            customTimezones.splice(index, 1);
            allTimezones = [...defaultTimezones, ...customTimezones];
            localStorage.setItem('customTimezones', JSON.stringify(customTimezones));
            updateClocks();
        }

        function updateAddedTimezonesDisplay() {
            const container = document.getElementById('addedTimezones');
            container.innerHTML = '';

            customTimezones.forEach((tz, index) => {
                const badge = document.createElement('div');
                badge.className = 'timezone-badge';
                badge.innerHTML = `
                    <span>${tz.city} (${tz.timezone})</span>
                    <button class="remove-btn" onclick="removeTimezone(${index})">✕</button>
                `;
                container.appendChild(badge);
            });
        }

        // Update clocks every second
        setInterval(updateClocks, 1000);

        // Initial update
        updateClocks();
    </script>
</body>
</html>
